version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: worldison_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: worldxaz_lms
      MYSQL_USER: worldxaz_db
      MYSQL_PASSWORD: Admin123Admin
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

volumes:
  mysql_data:
